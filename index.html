    });
    const loadImage = (src) => new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => reject(new Error('image-load-failed'));
      image.src = src;
    });
    const getDataUrlByteSize = (dataUrl) => {
      const base64 = dataUrl.split(',')[1] || '';
      const padding = (base64.match(/=*$/)?.[0].length) || 0;
      return Math.floor((base64.length * 3) / 4) - padding;
    };
    const isSupportedImageFile = (file) => {
      if (!file) return false;
      const mimeType = String(file.type || '').toLowerCase();
      const fileName = String(file.name || '').toLowerCase();
      return SUPPORTED_IMAGE_MIME_TYPES.includes(mimeType) || SUPPORTED_IMAGE_EXTENSIONS.some((ext) => fileName.endsWith(ext));
    };
    const compressImageFileToWebP = async (file) => {
      const sourceDataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(sourceDataUrl);
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      if (!context) throw new Error('canvas-not-supported');

      const longestSide = Math.max(image.naturalWidth, image.naturalHeight);
      const initialScale = longestSide > MAX_IMAGE_DIMENSION ? MAX_IMAGE_DIMENSION / longestSide : 1;
      let width = Math.max(1, Math.round(image.naturalWidth * initialScale));
      let height = Math.max(1, Math.round(image.naturalHeight * initialScale));
      let best = null;

      for (let dimensionPass = 0; dimensionPass < 5; dimensionPass += 1) {
        canvas.width = width;
        canvas.height = height;
        context.clearRect(0, 0, width, height);
        context.drawImage(image, 0, 0, width, height);

        for (let quality = 0.9; quality >= MIN_WEBP_QUALITY; quality -= 0.08) {
          const roundedQuality = Math.round(quality * 100) / 100;
          const dataUrl = canvas.toDataURL('image/webp', roundedQuality);
          const sizeBytes = getDataUrlByteSize(dataUrl);
          const candidate = { dataUrl, sizeBytes, width, height, quality: roundedQuality };

          if (!best || Math.abs(sizeBytes - TARGET_UPLOAD_BYTES) < Math.abs(best.sizeBytes - TARGET_UPLOAD_BYTES)) {
            best = candidate;
          }
          if (sizeBytes <= TARGET_UPLOAD_BYTES) {
            return candidate;
          }
        }

        width = Math.max(480, Math.round(width * 0.85));
        height = Math.max(480, Math.round(height * 0.85));
      }

      if (!best) throw new Error('compress-failed');
      return best;

        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => {
          window.clearTimeout(fallbackTimer);
          observer.disconnect();
        };
      }, [delay]);

      return (
        <div 
          ref={domRef} 
          className={`transition-all duration-[1000ms] ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'} ${className}`}

    const MainSite = ({ heroSlides, contentPages, homepageContent, currentRoute = '#/' }) => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);
      const visibleHeroSlides = getVisibleSlides(heroSlides);
      const aboutContent = homepageContent.about;
      const servicesContent = homepageContent.services;
      const workContent = homepageContent.work;
      const insightsContent = homepageContent.insights;
      const contactContent = homepageContent.contact;
      const workPage = contentPages.find((page) => page.key === 'work');
      const insightPage = contentPages.find((page) => page.key === 'insights');
      const homepageWorkItems = sortContentItems(workPage?.items || []).slice(0, 2);
      const homepageInsightItems = sortContentItems(insightPage?.items || []);
      const homepageInsightItemsByLatest = [...homepageInsightItems].sort((a, b) => String(b.publishedAt || '').localeCompare(String(a.publishedAt || '')));
      const homepageInsightItemsByPopularity = [...homepageInsightItems].sort((a, b) => {
        const popularDelta = Number(b.isPopular === true) - Number(a.isPopular === true);
        if (popularDelta !== 0) return popularDelta;
        return String(b.publishedAt || '').localeCompare(String(a.publishedAt || ''));
      });
      const servicesImageOverlayOpacity = Number(servicesContent.overlayOpacity ?? 0.84);
      const servicesCardOverlayControl = Number(servicesContent.cardOverlayOpacity ?? 1.4);
      const servicesCardOverlayOpacity = Math.min(0.95, Math.max(0, servicesCardOverlayControl / 2));
      const featuredInsight = homepageInsightItems.find((item) => item.id === insightsContent.featuredItemId)
        || homepageInsightItemsByLatest[0]
        || null;
      const manualSecondaryInsights = (insightsContent.secondaryItemIds || [])
        .map((id) => homepageInsightItems.find((item) => item.id === id))
        .filter(Boolean)
        .filter((item, index, list) => list.findIndex((candidate) => candidate.id === item.id) === index)
        .filter((item) => item.id !== featuredInsight?.id);
      const fallbackSidebarInsights = homepageInsightItemsByPopularity.filter((item) => (
        item.id !== featuredInsight?.id && !manualSecondaryInsights.some((manualItem) => manualItem.id === item.id)
      ));
      const sidebarInsightItems = [...manualSecondaryInsights, ...fallbackSidebarInsights].slice(0, 2);

      useEffect(() => {
        if (currentSlide >= visibleHeroSlides.length) {
          setCurrentSlide(Math.max(0, visibleHeroSlides.length - 1));
        }
      }, [visibleHeroSlides.length, currentSlide]);

      useEffect(() => {
        if (visibleHeroSlides.length <= 1) return; 
        const timer = setInterval(() => {
          setCurrentSlide((prev) => (prev + 1) % visibleHeroSlides.length);
        }, 6000); 
        return () => clearInterval(timer);
      }, [visibleHeroSlides.length]);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (currentRoute !== '#/' && currentRoute !== '') return;
        const shouldScrollTop = window.localStorage.getItem(PENDING_HOME_TOP_KEY);
        if (shouldScrollTop === 'true') {
          const topTimer = window.setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'auto' });
            window.localStorage.removeItem(PENDING_HOME_TOP_KEY);
            window.localStorage.removeItem(PENDING_ROUTE_TOP_KEY);
          }, 0);
          return () => window.clearTimeout(topTimer);
        }
        const pendingTarget = window.localStorage.getItem(PENDING_SCROLL_STORAGE_KEY);

          const reordered = [...items];
          const [moved] = reordered.splice(fromIndex, 1);

        if (!isSupportedImageFile(file)) {
          onError(`目前僅支援 ${SUPPORTED_IMAGE_LABEL} 格式。`);
          event.target.value = '';
          return;
        }
        if (file.size > MAX_UPLOAD_BYTES) {
          const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
          onError(`圖片約 ${fileSizeMB} MB，超過 2 MB。請先壓縮後再上傳。`);
          event.target.value = '';
          return;
        }

        setLoading(true);
        try {
          const compressed = await compressImageFileToWebP(file);
          const compressedKb = Math.round(compressed.sizeBytes / 1024);
          onSuccess(compressed.dataUrl);
          setFlashMessage(`圖片已轉成 WebP，壓縮後約 ${compressedKb} KB。`);
        } catch {
          onError('圖片壓縮失敗，請改用較小的圖片，或直接填入圖片網址。');
        } finally {
          setLoading(false);
          event.target.value = '';
        }
      };

        const file = event.target.files?.[0];

          setHeroFormErrors({ bgImage: `目前僅支援 ${SUPPORTED_IMAGE_LABEL} 格式。` });
          event.target.value = '';
          return;
        }
        if (file.size > MAX_UPLOAD_BYTES) {
          const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
          setHeroFormErrors({ bgImage: `圖片約 ${fileSizeMB} MB，超過 2 MB。請先壓縮後再上傳。` });
          event.target.value = '';
          return;

        setIsCompressingHeroImage(true);
        setHeroFormErrors((prev) => {
          const next = { ...prev };
          delete next.bgImage;
          return next;

        try {
          const compressed = await compressImageFileToWebP(file);

          setFlashMessage(`圖片已轉成 WebP，壓縮後約 ${compressedKb} KB。`);

                    <X size={20}/>
                  </button>
                </div>
                <form onSubmit={handleAddBrand} className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">品牌名稱</label>
                    <input required value={newBrand.name} onChange={e => setNewBrand({ ...newBrand, name: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" placeholder="例如：綠色生活科技" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">服務類型</label>
                    <input required value={newBrand.service} onChange={e => setNewBrand({ ...newBrand, service: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" placeholder="例如：ESG議題溝通" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">狀態</label>
                    <select value={newBrand.status} onChange={e => setNewBrand({ ...newBrand, status: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]">
                      <option value="Active">Active (活躍)</option>
                      <option value="In Progress">In Progress (進行中)</option>
                      <option value="Completed">Completed (已完成)</option>
                    </select>
                  </div>
                  <div className="flex justify-end gap-3 mt-8">
                    <button
                      type="button"
                      onClick={() => {
                        setIsAddModalOpen(false);
                        setEditingBrandId(null);
                        setNewBrand({ name: '', service: '', status: 'Active' });
                      }}
                      className="px-5 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition-colors"
                    >
                      取消
                    </button>
                    <button type="submit" className="px-5 py-2.5 bg-[#4e7055] text-white font-bold rounded-lg hover:bg-[#3a5240] transition-colors">
                      {editingBrandId ? '儲存修改' : '確認新增'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {isCategoryModalOpen && (
            <div className="fixed inset-0 bg-[#3a3a3a]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold text-[#3a3a3a]">{editingCategoryName ? '編輯子分類' : '新增子分類'}</h3>
                  <button onClick={() => setIsCategoryModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20}/></button>
                </div>
                <form onSubmit={saveCategoryForm} className="space-y-4">
                  {categoryFormError && (
                    <div className="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{categoryFormError}</div>
                  )}
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">子分類名稱</label>
                    <input value={categoryForm.name} onChange={e => setCategoryForm({ name: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" />
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onClick={() => setIsCategoryModalOpen(false)} className="px-5 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                    <button type="submit" className="px-5 py-2.5 bg-[#4e7055] text-white font-bold rounded-lg hover:bg-[#3a5240] transition-colors">儲存分類</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {isContentItemModalOpen && (
            <div className="fixed inset-0 bg-[#3a3a3a]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-5 md:p-6 w-full max-w-2xl shadow-xl max-h-[88vh] overflow-hidden flex flex-col">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold text-[#3a3a3a]">{editingContentItemId ? '編輯內容' : '新增內容'}</h3>
                  <button onClick={() => setIsContentItemModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20}/></button>
                </div>
                <form onSubmit={saveContentItemForm} className="space-y-4 overflow-y-auto pr-1">
                  {Object.keys(contentItemErrors).length > 0 && (
                    <div className="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                      {Object.values(contentItemErrors)[0]}
                    </div>
                  )}
                  <div className="grid md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-gray-700 mb-1">子分類</label>
                      <select value={contentItemForm.category} onChange={e => setContentItemForm({ ...contentItemForm, category: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]">
                        {(activeContentSection?.categories || []).map((category) => (
                          <option key={category} value={category}>{category}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-700 mb-1">圖片網址</label>
                      <input value={contentItemForm.image} onChange={e => setContentItemForm({ ...contentItemForm, image: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" />
                    </div>
                  </div>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-gray-700 mb-1">發佈日期</label>
                      <input type="date" value={contentItemForm.publishedAt} onChange={e => setContentItemForm({ ...contentItemForm, publishedAt: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" />
                    </div>
                    <div className="flex items-end">
                      <label className="inline-flex items-center gap-3 text-sm font-bold text-gray-700">
                        <input type="checkbox" checked={contentItemForm.isPopular} onChange={e => setContentItemForm({ ...contentItemForm, isPopular: e.target.checked })} className="w-4 h-4" />
                        設為熱門文章
                      </label>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">標題</label>
                    <input value={contentItemForm.title} onChange={e => setContentItemForm({ ...contentItemForm, title: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">摘要</label>
                    <input value={contentItemForm.subtitle} onChange={e => setContentItemForm({ ...contentItemForm, subtitle: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055]" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">內容</label>
                    <textarea rows="5" value={contentItemForm.body} onChange={e => setContentItemForm({ ...contentItemForm, body: e.target.value })} className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055] resize-none" />
                  </div>
                  {activeContentSectionKey === 'services' && (
                    <>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">服務內容色塊文字 <span className="text-gray-400 font-normal">每行一項</span></label>
                        <textarea
                          rows="4"
                          value={contentItemForm.tagsText}
                          onChange={e => setContentItemForm({ ...contentItemForm, tagsText: e.target.value })}
                          className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055] resize-none"
                          placeholder={'品牌定位梳理\n行銷管道策略\n數位轉型規劃\n議題包裝曝光'}
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">合作形式 <span className="text-gray-400 font-normal">每行一項，可留空</span></label>
                        <textarea
                          rows="3"
                          value={contentItemForm.collaborationModesText}
                          onChange={e => setContentItemForm({ ...contentItemForm, collaborationModesText: e.target.value })}
                          className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055] resize-none"
                          placeholder={'固定月費顧問陪跑\n單次專案合作'}
                        />
                      </div>
                    </>
                  )}
                  {activeContentSectionKey === 'work' && (
                    <div>
                      <label className="block text-xs font-bold text-gray-700 mb-1">成效 <span className="text-gray-400 font-normal">可留空</span></label>
                      <textarea
                        rows="4"
                        value={contentItemForm.result}
                        onChange={e => setContentItemForm({ ...contentItemForm, result: e.target.value })}
                        className="w-full border border-gray-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#4e7055] resize-none"
                        placeholder="例如：成效：影片總觀看 150萬+　·　FB觸及 107萬+"
                      />
                      <p className="mt-2 text-xs text-gray-400">未填寫時，前台不會顯示成效區塊。</p>
                    </div>
                  )}
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-2">或直接上傳圖片</label>
                    <input
                      type="file"
                      accept={SUPPORTED_IMAGE_ACCEPT}
                      onChange={handleContentItemImageUpload}
                      disabled={isCompressingContentImage}
                      className="block w-full text-sm text-gray-500 file:mr-4 file:rounded-lg file:border-0 file:bg-[#4e7055] file:px-4 file:py-2 file:text-sm file:font-bold file:text-white hover:file:bg-[#3a5240] disabled:cursor-not-allowed disabled:opacity-60"
                    />
                    <p className="mt-2 text-xs text-gray-400">{isCompressingContentImage ? '內容圖片壓縮中...' : `支援 ${SUPPORTED_IMAGE_LABEL} 格式，上傳後會自動轉 WebP 並壓到約 70 KB。`}</p>
                  </div>
                  <div className="rounded-lg overflow-hidden border border-gray-200 bg-gray-100 aspect-[16/9] min-h-[180px]">
                    <img src={contentItemForm.image || activeContentSection?.heroImage} alt="Content preview" className="w-full h-full object-cover" />
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t border-gray-100 sticky bottom-0 bg-white">
                    <button type="button" onClick={() => setIsContentItemModalOpen(false)} className="px-5 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                    <button type="submit" className="px-5 py-2.5 bg-[#4e7055] text-white font-bold rounded-lg hover:bg-[#3a5240] transition-colors">儲存內容</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {contentDeleteTarget && (
            <div className="fixed inset-0 bg-[#3a3a3a]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-xl">
                <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4"><Trash2 size={24} /></div>
                <h3 className="text-xl font-bold text-[#3a3a3a] mb-2">刪除內容項目？</h3>
                <p className="text-gray-500 mb-6 text-sm">「{contentDeleteTarget.title}」刪除後無法復原。</p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setContentDeleteTarget(null)} className="flex-1 px-4 py-2.5 text-gray-600 bg-gray-100 font-bold rounded-lg hover:bg-gray-200 transition-colors">取消</button>
                  <button onClick={confirmDeleteContentItem} className="flex-1 px-4 py-2.5 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-colors">確定刪除</button>
                </div>
              </div>
            </div>
          )}

          {deleteHeroConfirmId !== null && (
            <div className="fixed inset-0 bg-[#3a3a3a]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-xl animate-in fade-in zoom-in duration-200">
                <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4"><Trash2 size={24} /></div>
                <h3 className="text-xl font-bold text-[#3a3a3a] mb-2">確定要刪除 Banner 嗎？</h3>
                <p className="text-gray-500 mb-6 text-sm">此動作無法復原，首頁將不再顯示這張輪播圖。</p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setDeleteHeroConfirmId(null)} className="flex-1 px-4 py-2.5 text-gray-600 bg-gray-100 font-bold rounded-lg hover:bg-gray-200 transition-colors">取消</button>
                  <button onClick={confirmDeleteHero} className="flex-1 px-4 py-2.5 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-colors">確定刪除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 3. 頂層應用程式 App
    // ==========================================
    function App() {
      const [currentRoute, setCurrentRoute] = useState(window.location.hash);
      const localSiteState = useRef(readLocalSiteState());
      const syncTimerRef = useRef(null);
      const hasCompletedBootstrapRef = useRef(false);
      const [heroSlides, setHeroSlides] = useState(localSiteState.current.heroSlides);
      const [contentPages, setContentPages] = useState(localSiteState.current.contentPages);
      const [homepageContent, setHomepageContent] = useState(localSiteState.current.homepageContent);
      const [brands, setBrands] = useState(localSiteState.current.brands);
      const [serviceRecords, setServiceRecords] = useState(localSiteState.current.serviceRecords);
      const [teamAccess, setTeamAccess] = useState(localSiteState.current.teamAccess);
      const [storageState, setStorageState] = useState({
        mode: isSupabaseConfigured ? 'supabase' : 'local',
        isLoading: isSupabaseConfigured,
        isSyncing: false,
        error: '',
        lastSyncedAt: ''
      });

      useEffect(() => {
        const handleHashChange = () => setCurrentRoute(window.location.hash);
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      useEffect(() => {
        let isCancelled = false;

        const hydrateFromSupabase = async () => {
          if (!supabase) {
            hasCompletedBootstrapRef.current = true;
            setStorageState((prev) => ({ ...prev, mode: 'local', isLoading: false }));
            return;
          }

          setStorageState((prev) => ({ ...prev, mode: 'supabase', isLoading: true, error: '' }));
          const { data, error } = await supabase
            .from(SUPABASE_SITE_STATE_TABLE)
            .select('payload, updated_at')
            .eq('site_id', SUPABASE_SITE_STATE_ID)
            .maybeSingle();

          if (isCancelled) return;

          if (error) {
            console.error('Failed to load site state from Supabase:', error);
            hasCompletedBootstrapRef.current = true;
            setStorageState((prev) => ({
              ...prev,
              mode: 'local',
              isLoading: false,
              error: error.message || '無法讀取雲端資料'
            }));
            return;
          }

          if (data?.payload) {
            const remoteState = normalizeRemoteSiteState(data.payload);
            setHeroSlides(remoteState.heroSlides);
            setContentPages(remoteState.contentPages);
            setHomepageContent(remoteState.homepageContent);
            setBrands(remoteState.brands);
            setServiceRecords(remoteState.serviceRecords);
            setTeamAccess(remoteState.teamAccess);
          }

          hasCompletedBootstrapRef.current = true;
          setStorageState((prev) => ({
            ...prev,
            mode: 'supabase',
            isLoading: false,
            error: '',
            lastSyncedAt: data?.updated_at
              ? new Date(data.updated_at).toLocaleString('zh-TW', { hour12: false })
              : prev.lastSyncedAt
          }));
        };

        hydrateFromSupabase();
        return () => {
          isCancelled = true;
        };
      }, []);

      useEffect(() => {
        const pendingRouteTop = window.localStorage.getItem(PENDING_ROUTE_TOP_KEY);
        const normalizedRoute = currentRoute || '#/';
        if (!pendingRouteTop || pendingRouteTop !== normalizedRoute) return;
        const timer = window.setTimeout(() => {
          window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
          window.localStorage.removeItem(PENDING_ROUTE_TOP_KEY);
          if (normalizedRoute === '#/') {
            window.localStorage.removeItem(PENDING_HOME_TOP_KEY);
          }
        }, 0);
        return () => window.clearTimeout(timer);
      }, [currentRoute]);

      useEffect(() => {
        persistLocalSiteState({ heroSlides, contentPages, homepageContent, brands, serviceRecords, teamAccess });
      }, [heroSlides, contentPages, homepageContent, brands, serviceRecords, teamAccess]);
      useEffect(() => {
        if (!hasCompletedBootstrapRef.current || !supabase || storageState.mode !== 'supabase') return;
        if (syncTimerRef.current) window.clearTimeout(syncTimerRef.current);

        syncTimerRef.current = window.setTimeout(async () => {
          const payload = {
            heroSlides: normalizeHeroSlides(heroSlides),
            contentPages: normalizeContentPages(contentPages),
            homepageContent: normalizeHomepageContent(homepageContent),
            brands,
            serviceRecords: normalizeServiceRecords(serviceRecords),
            teamAccess
          };

          setStorageState((prev) => ({ ...prev, isSyncing: true, error: '', mode: 'supabase' }));
          const { error } = await supabase
            .from(SUPABASE_SITE_STATE_TABLE)
            .upsert({
              site_id: SUPABASE_SITE_STATE_ID,
              payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'site_id' });

          if (error) {
            console.error('Failed to sync site state to Supabase:', error);
            setStorageState((prev) => ({
              ...prev,
              isSyncing: false,
              error: error.message || '雲端同步失敗'
            }));
            return;
          }

          setStorageState((prev) => ({
            ...prev,
            isSyncing: false,
            error: '',
            lastSyncedAt: new Date().toLocaleString('zh-TW', { hour12: false })
          }));
        }, 600);

        return () => {
          if (syncTimerRef.current) {
            window.clearTimeout(syncTimerRef.current);
            syncTimerRef.current = null;
          }
        };
      }, [heroSlides, contentPages, homepageContent, brands, serviceRecords, teamAccess, storageState.mode]);
      useEffect(() => {
        applyFaviconToDocument(homepageContent?.footer?.faviconUrl || defaultHomepageContent.footer.faviconUrl);
      }, [homepageContent?.footer?.faviconUrl]);

      if (currentRoute === '#/private-manager') {
        return (
          <AdminApp
            heroSlides={heroSlides}
            setHeroSlides={setHeroSlides}
            contentPages={contentPages}
            setContentPages={setContentPages}
            homepageContent={homepageContent}
            setHomepageContent={setHomepageContent}
            brands={brands}
            setBrands={setBrands}
            serviceRecords={serviceRecords}
            setServiceRecords={setServiceRecords}
            teamAccess={teamAccess}
            setTeamAccess={setTeamAccess}
            storageState={storageState}
          />
        );
      }
      const contentItemEntry = getContentItemByRoute(contentPages, currentRoute);
      if (contentItemEntry) {
        return <ContentItemDetailPage page={contentItemEntry.page} item={contentItemEntry.item} heroSlides={heroSlides} footerContent={homepageContent.footer} />;
      }
      const contentPage = getContentPageByRoute(contentPages, currentRoute);
      if (contentPage) {
        return <ContentDetailPage page={contentPage} heroSlides={heroSlides} footerContent={homepageContent.footer} homepageContent={homepageContent} />;
      }
      return <MainSite heroSlides={heroSlides} contentPages={contentPages} homepageContent={homepageContent} currentRoute={currentRoute || '#/'} />;
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
